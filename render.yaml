# Render Blueprint for the PARAKKAT ATS backend.
# Optional: in Render you can "New → Blueprint" and point it at this repo, or
# just create a Web Service manually with the same settings (see DEPLOY.md).
# Values marked `sync: false` are secrets — set them in the Render dashboard.
services:
  - type: web
    name: parakkat-ats-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: resume
      # Your Vercel production URL, e.g. https://your-app.vercel.app
      - key: CLIENT_URL
        sync: false
      # AI provider (optional — can also be configured in-app via Settings)
      - key: AI_PROVIDER
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
